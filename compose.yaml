services:
  flightbooking:
    build: .
    ports:
      - "8000:80"
    environment:
      - DATABASE_URL=postgresql://madhu:root@db/flightbooking
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:


